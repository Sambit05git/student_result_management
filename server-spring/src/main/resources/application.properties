# Application Name and Port
spring.application.name=srms
server.port=${PORT:5000}

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/srmsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Configuration (Optional, good for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT Secret and Expiration (HS256 requires at least 32 characters)
jwt.secret=sEcReTsEcReTsEcReTsEcReTsEcReTsEcReT
jwt.expiration=86400000
